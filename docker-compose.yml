services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hms}
      POSTGRES_USER: ${POSTGRES_USER:-hms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hms}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]

  celery_worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=2"]

  celery_beat:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "config", "beat", "-l", "info",
              "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
  backend_static:
  backend_media:
