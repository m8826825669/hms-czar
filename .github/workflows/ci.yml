name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hms_test
          POSTGRES_USER: hms
          POSTGRES_PASSWORD: hms
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hms"
          --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev default-libmysqlclient-dev pkg-config \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libffi-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check . || true   # Don't fail CI on lint warnings in Phase 0

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DJANGO_SECRET_KEY: test-secret
          POSTGRES_HOST: localhost
          POSTGRES_DB: hms_test
          POSTGRES_USER: hms
          POSTGRES_PASSWORD: hms
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint || true   # Phase 0: warnings allowed

      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        run: npm run build
